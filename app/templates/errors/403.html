{% extends "base.html" %}
{% block title %}403 – Forbidden{% endblock %}
{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center">
        <h1 class="display-1 fw-bold text-danger">403</h1>
        <h3 class="text-white mb-3">Access Denied</h3>
        <p class="text-muted mb-4">You don't have permission to access this resource.</p>
        <a href="{{ url_for('index') }}" class="btn btn-gradient-primary"><i class="fas fa-home me-2"></i>Go Home</a>
    </div>
</div>
{% endblock %}
