{% extends "base.html" %}
{% block title %}500 – Server Error{% endblock %}
{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center">
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h3 class="text-white mb-3">Internal Server Error</h3>
        <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('index') }}" class="btn btn-gradient-primary"><i class="fas fa-home me-2"></i>Go Home</a>
    </div>
</div>
{% endblock %}
