{% extends "base.html" %}
{% block title %}Change Password – HemoPulse AI Pro{% endblock %}
{% block page_title %}Security Settings{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="saas-card">
            <h5 class="text-dark fw-bold mb-4"><i class="fas fa-shield-alt text-primary me-2"></i>Change Password</h5>
            
            <form action="{{ url_for('public.change_password') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-4">
                    <label class="form-label text-dark">Current Password</label>
                    <input type="password" name="current_password" class="form-control" required>
                </div>
                
                <div class="mb-3 border-top border-secondary pt-4">
                    <label class="form-label text-dark">New Password</label>
                    <input type="password" name="new_password" class="form-control" required>
                    <div class="password-strength mt-2"><div class="password-strength-bar"></div></div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-dark">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                
                <div class="d-flex gap-2">
                    <a href="{{ url_for('public.profile') }}" class="btn btn-outline-secondary btn-pill flex-grow-1">Cancel</a>
                    <button type="submit" class="btn btn-primary btn-pill flex-grow-1">Update Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
